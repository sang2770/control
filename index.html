<!DOCTYPE html>
<html>
  <head>
    <title>HitClub Control Panel</title>
    <link rel="stylesheet" href="styles.css" />
    <meta charset="UTF-8" />
    <style>
      .d-flex {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
    </style>
  </head>

  <body>
    <div style="flex: 1; width: 100%">
      <label for="systemKeys"
        >Danh sách key hợp lệ (phân cách bằng dấu phẩy):</label
      >
      <textarea
        style="width: 96%"
        id="systemKeys"
        placeholder="Enter system keys (e.g., a,b,c)"
      ></textarea>
    </div>
    <div class="d-flex" style="gap: 10px">
      <div>
        <label for="joinDelay">Delay Vào Bàn (ms):</label>
        <input
          type="number"
          id="joinDelay"
          placeholder="Enter delay in ms"
          min="0"
        />
      </div>
      <div>
        <label for="checkDelay">Delay Check Tên (ms):</label>
        <input
          type="number"
          id="checkDelay"
          placeholder="Enter delay in ms"
          min="0"
        />
      </div>
      <div style="flex: 1">
        <label for="selectedTable">Chọn Bàn Tiền:</label>
        <select id="selectedTable" style="width: 100%">
          <option value="100">100</option>
          <option value="500">500</option>
          <option value="1000">1K</option>
          <option value="2000">2K</option>
          <option value="5000">5K</option>
          <option value="10000">10K</option>
          <option value="20000">20K</option>
          <option value="50000">50K</option>
          <option value="100000">100K</option>
          <option value="200000">200K</option>
          <option value="500000">500K</option>
          <option value="1000000">1M</option>
          <option value="2000000">2M</option>
          <option value="5000000">5M</option>
          <option value="10000000">10M</option>
        </select>
      </div>
    </div>
    <div>
      <label for="method">Kiểu nhảy</label>
      <select id="method" style="width: 100%">
        <option value="1">Nhảy thường</option>
        <option value="2">Nhảy chủ bản</option>
      </select>
    </div>
    <button
      id="joinRoomToggle"
      style="background-color: green; color: white; width: 100%"
    >
      Bắt Đầu
    </button>

    <div id="note">
      <p>
        <strong
          >Chú ý: Ở lại bàn trong trường hợp: 1 key mình là chủ bàn, 2 key mình
          là người chơi và nhảy vào key mình chủ bàn</strong
        >
      </p>
    </div>
    <div>
      <label>Trạng thái:</label>
      <textarea
        id="statusLog"
        readonly
        style="width: 96%; height: 100px"
      ></textarea>
    </div>
    <script src="renderer.js"></script>
  </body>
</html>
